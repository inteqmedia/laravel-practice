version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: laravel-app
    volumes:
      - ../src:/var/www
    working_dir: /var/www
    expose:
      - "9000"   # PHP-FPM port
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: laravel-nginx
    ports:
      - "8001:80"   # Laravel accessible via host:8001
    volumes:
      - ../src:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    external: true
